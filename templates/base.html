<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}مرغداری صدیقی{% endblock %}</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700;800&display=swap');
:root{
  --glass:rgba(255,255,255,0.07);
  --glass-border:rgba(255,255,255,0.15);
  --glass-hover:rgba(255,255,255,0.12);
  --accent:#f5a623;--accent2:#e8962a;
  --green:#22c55e;--red:#ef4444;--blue:#3b82f6;--purple:#a855f7;
  --text:#f0f4ff;--text2:#a8b8d8;--gold:#fbbf24;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:'Vazirmatn',sans-serif;
  color:var(--text);
  min-height:100vh;
  direction:rtl;
  background: #0d1117;
  background-image:
    radial-gradient(ellipse at 15% 20%, rgba(245,166,35,0.12) 0%, transparent 50%),
    radial-gradient(ellipse at 85% 80%, rgba(59,130,246,0.10) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 50%, rgba(168,85,247,0.06) 0%, transparent 60%);
  background-attachment: fixed;
  position:relative;
}
/* Watermark chicken */
body::before{
  content:'🐓';
  position:fixed;
  font-size:420px;
  opacity:0.025;
  bottom:-60px;
  left:-40px;
  pointer-events:none;
  z-index:0;
  filter:grayscale(1);
  line-height:1;
}
body::after{
  content:'🐣';
  position:fixed;
  font-size:220px;
  opacity:0.025;
  top:60px;
  right:-20px;
  pointer-events:none;
  z-index:0;
  filter:grayscale(1);
}
::-webkit-scrollbar{width:6px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.15);border-radius:3px;}

/* Glassmorphism navbar */
.navbar{
  background:rgba(13,17,23,0.6);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--glass-border);
  padding:0 24px;height:64px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100;
}
.navbar-brand{display:flex;align-items:center;gap:12px;text-decoration:none;}
.brand-icon{
  width:44px;height:44px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  border-radius:12px;display:flex;align-items:center;justify-content:center;
  font-size:22px;box-shadow:0 4px 20px rgba(245,166,35,0.4);
}
.brand-text .title{font-size:16px;font-weight:800;color:var(--gold);}
.brand-text .sub{font-size:11px;color:var(--text2);}
.nav-links{display:flex;align-items:center;gap:8px;}
.nav-btn{
  padding:8px 16px;border-radius:10px;text-decoration:none;font-size:13px;
  font-weight:600;transition:all 0.2s;display:flex;align-items:center;gap:6px;
  color:var(--text2);border:1px solid transparent;
  backdrop-filter:blur(10px);
}
.nav-btn:hover{background:var(--glass-hover);color:var(--text);border-color:var(--glass-border);}
.nav-btn.active{background:var(--glass);color:var(--accent);border-color:rgba(245,166,35,0.3);}
.nav-btn.primary{
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#000;font-weight:700;border:none;
}
.nav-btn.primary:hover{opacity:0.9;transform:translateY(-1px);box-shadow:0 6px 20px rgba(245,166,35,0.4);}

.container{max-width:1400px;margin:0 auto;padding:24px;position:relative;z-index:1;}

/* Glass cards */
.card{
  background:var(--glass);
  backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
  border:1px solid var(--glass-border);
  border-radius:20px;padding:20px;
  transition:all 0.3s;
  box-shadow:0 4px 24px rgba(0,0,0,0.2);
}
.card:hover{background:var(--glass-hover);border-color:rgba(255,255,255,0.22);box-shadow:0 8px 32px rgba(0,0,0,0.3);}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--glass-border);}
.card-title{font-size:15px;font-weight:700;display:flex;align-items:center;gap:8px;}

.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:12px;}
.stat-card{
  background:var(--glass);
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  border:1px solid var(--glass-border);
  border-radius:16px;padding:16px;position:relative;overflow:hidden;
  transition:all 0.3s;
}
.stat-card:hover{background:var(--glass-hover);transform:translateY(-2px);}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--accent-color,var(--accent));}
.stat-label{font-size:11px;color:var(--text2);margin-bottom:6px;}
.stat-value{font-size:22px;font-weight:800;color:var(--accent-color,var(--text));}
.stat-sub{font-size:10px;color:var(--text2);margin-top:3px;}

.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:6px;font-size:11px;font-weight:600;}
.badge-green{background:rgba(34,197,94,0.2);color:var(--green);border:1px solid rgba(34,197,94,0.3);}
.badge-red{background:rgba(239,68,68,0.2);color:var(--red);border:1px solid rgba(239,68,68,0.3);}
.badge-yellow{background:rgba(245,166,35,0.2);color:var(--gold);border:1px solid rgba(245,166,35,0.3);}
.badge-blue{background:rgba(59,130,246,0.2);color:var(--blue);border:1px solid rgba(59,130,246,0.3);}
.badge-purple{background:rgba(168,85,247,0.2);color:var(--purple);border:1px solid rgba(168,85,247,0.3);}

.form-group{margin-bottom:14px;}
.form-label{display:block;font-size:12px;color:var(--text2);margin-bottom:6px;font-weight:600;}
.form-control{
  width:100%;
  background:rgba(0,0,0,0.3);
  backdrop-filter:blur(8px);
  border:1px solid var(--glass-border);
  border-radius:10px;padding:10px 12px;
  color:var(--text);font-size:13px;
  font-family:'Vazirmatn',sans-serif;transition:all 0.2s;
}
.form-control:focus{outline:none;border-color:rgba(245,166,35,0.5);background:rgba(0,0,0,0.4);box-shadow:0 0 0 3px rgba(245,166,35,0.1);}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}

.btn{padding:9px 18px;border-radius:10px;border:none;cursor:pointer;font-size:13px;font-weight:600;font-family:'Vazirmatn',sans-serif;transition:all 0.2s;display:inline-flex;align-items:center;gap:6px;}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#000;}
.btn-primary:hover{opacity:0.9;transform:translateY(-1px);box-shadow:0 6px 20px rgba(245,166,35,0.4);}
.btn-success{background:rgba(34,197,94,0.15);color:var(--green);border:1px solid rgba(34,197,94,0.3);backdrop-filter:blur(8px);}
.btn-success:hover{background:rgba(34,197,94,0.25);}
.btn-danger{background:rgba(239,68,68,0.15);color:var(--red);border:1px solid rgba(239,68,68,0.3);backdrop-filter:blur(8px);}
.btn-danger:hover{background:rgba(239,68,68,0.25);}
.btn-ghost{background:var(--glass);color:var(--text2);border:1px solid var(--glass-border);backdrop-filter:blur(8px);}
.btn-ghost:hover{color:var(--text);background:var(--glass-hover);}
.btn-sm{padding:5px 10px;font-size:11px;}

.table-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;}
th{background:rgba(0,0,0,0.3);color:var(--text2);font-size:11px;font-weight:700;padding:10px 12px;text-align:right;border-bottom:1px solid var(--glass-border);white-space:nowrap;}
td{padding:10px 12px;font-size:12px;border-bottom:1px solid rgba(255,255,255,0.05);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:rgba(255,255,255,0.04);}

.tabs{display:flex;gap:4px;border-bottom:1px solid var(--glass-border);margin-bottom:20px;overflow-x:auto;}
.tab-btn{padding:10px 18px;background:none;border:none;color:var(--text2);font-size:13px;font-weight:600;font-family:'Vazirmatn',sans-serif;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap;display:flex;align-items:center;gap:6px;transition:all 0.2s;}
.tab-btn:hover{color:var(--text);}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent);}
.tab-content{display:none;}
.tab-content.active{display:block;}

.alert{padding:12px 16px;border-radius:12px;font-size:13px;font-weight:500;display:flex;align-items:center;gap:10px;margin-bottom:12px;backdrop-filter:blur(8px);}
.alert-danger{background:rgba(239,68,68,0.12);border:1px solid rgba(239,68,68,0.3);color:#fca5a5;}
.alert-warning{background:rgba(245,166,35,0.12);border:1px solid rgba(245,166,35,0.3);color:var(--gold);}
.alert-success{background:rgba(34,197,94,0.12);border:1px solid rgba(34,197,94,0.3);color:#86efac;}
.progress{background:rgba(0,0,0,0.3);border-radius:4px;height:6px;overflow:hidden;}
.progress-bar{height:100%;border-radius:4px;transition:width 0.3s;}
@media(max-width:768px){.form-row{grid-template-columns:1fr;}.container{padding:16px;}.stat-grid{grid-template-columns:1fr 1fr;}}
</style>
{% block extra_head %}{% endblock %}
</head>
<body>
<nav class="navbar">
  <a href="{{ url_for('dashboard') }}" class="navbar-brand">
    <div class="brand-icon">🐔</div>
    <div class="brand-text">
      <div class="title">مرغداری صدیقی</div>
      <div class="sub">Sediqi Poultry Farm</div>
    </div>
  </a>
  <div class="nav-links">
    <a href="{{ url_for('dashboard') }}" class="nav-btn {% if request.endpoint=='dashboard' %}active{% endif %}">
      <i class="fas fa-home"></i> داشبورد
    </a>
    <a href="{{ url_for('new_flock') }}" class="nav-btn primary">
      <i class="fas fa-plus"></i> گله جدید
    </a>
  </div>
</nav>
<div class="container">{% block content %}{% endblock %}</div>
<script>
function switchTab(tabId,groupId){
  document.querySelectorAll('[data-tab-group="'+groupId+'"]').forEach(t=>t.classList.remove('active'));
  document.getElementById(tabId).classList.add('active');
  document.querySelectorAll('[data-group="'+groupId+'"]').forEach(b=>b.classList.remove('active'));
  event.currentTarget.classList.add('active');
}
</script>
{% block extra_scripts %}{% endblock %}
</body>
</html>
