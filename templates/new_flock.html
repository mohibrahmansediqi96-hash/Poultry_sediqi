{% extends "base.html" %}
{% block title %}گله جدید - مرغداری صدیقی{% endblock %}
{% block content %}
<div style="max-width:520px; margin:0 auto;">
  <div style="margin-bottom:24px;">
    <h1 style="font-size:22px; font-weight:800; color:#fbbf24;">ثبت گله جدید</h1>
    <p style="color:#64748b; font-size:13px; margin-top:4px;">اطلاعات اولیه گله را وارد کنید</p>
  </div>
  <div class="card">
    <div style="text-align:center; font-size:60px; margin-bottom:20px;">🐣</div>
    <form method="POST">
      <div class="form-group">
        <label class="form-label"><i class="fas fa-calendar"></i> تاریخ ورود به سالن</label>
        <input type="date" name="entry_date" class="form-control" required value="{{ today }}">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label"><i class="fas fa-dove"></i> تعداد جوجه</label>
          <input type="number" name="count" class="form-control" placeholder="مثال: 10000" required min="1">
        </div>
        <div class="form-group">
          <label class="form-label"><i class="fas fa-tag"></i> قیمت فی مرغ (افغانی)</label>
          <input type="number" name="price_per_chick" class="form-control" placeholder="مثال: 25" step="0.01" required>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label"><i class="fas fa-dna"></i> نژاد</label>
        <select name="breed" class="form-control">
          <option value="Ross">Ross 308</option>
          <option value="Cobb">Cobb 500</option>
          <option value="Arbor Acres">Arbor Acres</option>
        </select>
      </div>
      <div style="display:flex; gap:12px; margin-top:8px;">
        <a href="{{ url_for('dashboard') }}" class="btn btn-ghost" style="flex:1; justify-content:center;">
          <i class="fas fa-arrow-right"></i> بازگشت
        </a>
        <button type="submit" class="btn btn-primary" style="flex:2; justify-content:center;">
          <i class="fas fa-plus"></i> ثبت گله و شروع دوره
        </button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
{% block extra_scripts %}
<script>
document.querySelector('[name=entry_date]').value = new Date().toISOString().split('T')[0];
</script>
{% endblock %}
