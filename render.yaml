services:
  - type: web
    name: poultry-sediqi
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: poultry-db
          property: connectionString

databases:
  - name: poultry-db
    plan: free
